<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator 😂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😂 Joke Generator</h1>
            
            <div class="joke-display">
                <p id="joke-text">Click the button to get a random joke!</p>
            </div>
            
            <div class="button-group">
                <button id="joke-btn" class="btn btn-primary">Get Joke</button>
                <button id="copy-btn" class="btn btn-secondary">Copy Joke</button>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>
            
            <div id="error" class="error" style="display: none;">
                <p id="error-text"></p>
            </div>
            
            <div class="joke-count">
                <p>Jokes loaded: <span id="count">0</span></p>
            </div>
        </div>
        
        <div class="api-info">
            <h3>💡 API Info</h3>
            <p>Using: <strong>Official Joke API</strong></p>
            <p>Endpoint: <code>https://official-joke-api.appspot.com/random_joke</code></p>
            <p><a href="https://github.com/15Dkk/official_joke_api" target="_blank">Learn about the API →</a></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
